<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b2545" />
    <!-- Relative hrefs: the site is served from /readyreaders/ on GitHub Pages -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>Evie's Reading Realms</title>
    <style>
      @font-face {
        font-family: 'Andika';
        /* Relative URL: vite does not rewrite url() in inline <style> for the
           /readyreaders/ production base, so absolute /fonts/ would 404. */
        src: url('./fonts/andika/Andika-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: 'Andika';
        src: url('./fonts/andika/Andika-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: block;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b2545;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      /* Preload the font so Phaser text measures correctly on first render */
      #font-preload {
        position: absolute;
        left: -9999px;
        top: -9999px;
        font-family: 'Andika', sans-serif;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="font-preload">a<b>a</b></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
