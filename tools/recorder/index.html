<!doctype html>
<!--
  Family voice recorder — served by scripts/recorder-server.ts (npm run recorder).
  One self-contained page, no framework, no CDN: the parent records each clip
  and it lands in public/audio/ with exactly the filename the game loads.
  MP3 via lamejs when /lamejs.js is served; otherwise an inline WAV fallback
  (the game accepts .wav too).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ready Readers — Family Voice Recorder</title>
<style>
  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --ink: #26323f;
    --muted: #7a8694;
    --coral: #ef476f;
    --teal: #06d6a0;
    --gold: #ffd166;
    --line: #ede3d4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 22px 0;
    flex: none;
  }
  .head-row { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 22px; margin: 0; }
  #total {
    font-weight: 700;
    color: var(--teal);
    background: #e6faf3;
    border-radius: 999px;
    padding: 4px 14px;
  }
  nav { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
  nav button {
    font-size: 16px;
    padding: 10px 16px;
    border: 2px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    cursor: pointer;
    color: var(--ink);
  }
  nav button.active { border-color: var(--coral); background: #ffeef2; font-weight: 700; }
  nav .badge { color: var(--muted); font-size: 13px; margin-left: 6px; }
  nav button.done .badge { color: var(--teal); font-weight: 700; }
  #coach {
    background: var(--gold);
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 12px;
    font-size: 15px;
    display: none;
  }
  main { flex: 1; display: flex; gap: 18px; padding: 0 22px 18px; min-height: 0; }
  #list {
    width: 360px;
    flex: none;
    overflow-y: auto;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 6px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
  }
  .row:hover { background: #fdf3f5; }
  .row.selected { background: #ffeef2; outline: 2px solid var(--coral); }
  .row .file { font-family: ui-monospace, monospace; color: var(--muted); white-space: nowrap; }
  .row .say { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .check { flex: none; width: 22px; text-align: center; }
  #card {
    flex: 1;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 26px 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  #file { font-family: ui-monospace, monospace; color: var(--muted); font-size: 14px; }
  #say-label { color: var(--muted); font-size: 15px; margin-bottom: -8px; }
  #say { font-size: 34px; font-weight: 800; line-height: 1.25; }
  #note { color: var(--muted); font-size: 15px; min-height: 1.2em; }
  #meter-wrap {
    height: 18px;
    background: #f2ece1;
    border-radius: 999px;
    overflow: hidden;
  }
  #meter { height: 100%; width: 0%; background: var(--teal); transition: width 60ms linear; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .controls button {
    font-size: 18px;
    min-height: 64px;
    min-width: 64px;
    padding: 12px 22px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    background: #f2ece1;
    color: var(--ink);
    font-weight: 700;
  }
  .controls button:disabled { opacity: 0.35; cursor: default; }
  #btn-record { background: var(--coral); color: #fff; font-size: 20px; }
  #btn-record.recording { background: #b3123e; animation: pulse 1.1s infinite; }
  #btn-save { background: var(--teal); color: #fff; }
  @keyframes pulse { 50% { transform: scale(1.05); } }
  #status { color: var(--muted); font-size: 14px; min-height: 1.2em; }
  #existing {
    display: none;
    align-items: center;
    gap: 12px;
    background: #e6faf3;
    border-radius: 14px;
    padding: 10px 16px;
    font-size: 15px;
  }
  #existing button {
    font-size: 16px;
    min-height: 44px;
    padding: 8px 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #fff;
  }
  kbd {
    background: #f2ece1;
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 12px;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>🎙 Family Voice Recorder</h1>
    <span id="total">…</span>
    <span style="color:var(--muted);font-size:13px"><kbd>Space</kbd> record/stop · <kbd>Enter</kbd> save &amp; next</span>
  </div>
  <nav id="tabs"></nav>
  <div id="coach">🔤 Say the PURE sound, short and clipped — /sh/ not <i>shuh</i> — never the letter name.</div>
</header>
<main>
  <div id="list"></div>
  <div id="card">
    <div id="file"></div>
    <div id="existing">
      <span id="existing-label"></span>
      <button id="btn-play-existing">▶ Play</button>
      <button id="btn-delete">🗑 Re-record</button>
    </div>
    <div id="say-label">Say:</div>
    <div id="say"></div>
    <div id="note"></div>
    <div id="meter-wrap"><div id="meter"></div></div>
    <div class="controls">
      <button id="btn-record">⏺ Record</button>
      <button id="btn-preview" disabled>▶ Preview</button>
      <button id="btn-save" disabled>💾 Save &amp; next</button>
      <button id="btn-retake" disabled>↻ Re-record</button>
      <button id="btn-skip">⏭ Skip</button>
    </div>
    <div id="status"></div>
  </div>
</main>
<script src="/lamejs.js"></script>
<script>
'use strict';

const KINDS = ['graphemes', 'ui', 'words', 'phrases', 'sentences'];
const TAB_LABELS = { graphemes: '🔤 Letter sounds', ui: '🗣 Narration', words: '📖 Words', phrases: '✨ Phrases', sentences: '📜 Sentences' };
const SAMPLE_RATE = 44100;

let clips = [];            // manifest entries {kind,id,scriptLine,note,exists,ext}
let activeTab = 'graphemes';
let selected = null;       // the clip currently on the card
let take = null;           // {bytes: Uint8Array, format, mime} — encoded, unsaved
let previewUrl = null;

let stream = null;
let recorder = null;
let recChunks = [];
let recording = false;
let analyser = null;
let meterRaf = 0;
let decodeCtx = null;
const hasMp3 = typeof window.lamejs !== 'undefined' && !!window.lamejs.Mp3Encoder;

const $ = (id) => document.getElementById(id);

// ---------- data ----------

async function loadManifest() {
  clips = await (await fetch('/manifest.json')).json();
  selectFirstUnrecorded();
  render();
}

function tabClips(kind) { return clips.filter((c) => c.kind === kind); }

function selectFirstUnrecorded() {
  const group = tabClips(activeTab);
  selected = group.find((c) => !c.exists) || group[0] || null;
}

function advance() {
  // next unrecorded in this tab, scanning forward from the current clip first
  const group = tabClips(activeTab);
  const i = group.indexOf(selected);
  const after = group.slice(i + 1).find((c) => !c.exists);
  selected = after || group.find((c) => !c.exists) || selected;
  clearTake();
  render();
}

// ---------- rendering ----------

function render() {
  const done = clips.filter((c) => c.exists).length;
  $('total').textContent = `${done} of ${clips.length} recorded`;

  const tabs = $('tabs');
  tabs.innerHTML = '';
  for (const kind of KINDS) {
    const group = tabClips(kind);
    const n = group.filter((c) => c.exists).length;
    const b = document.createElement('button');
    b.innerHTML = `${TAB_LABELS[kind]}<span class="badge">${n}/${group.length}</span>`;
    b.className = (kind === activeTab ? 'active' : '') + (n === group.length ? ' done' : '');
    b.onclick = () => { activeTab = kind; selectFirstUnrecorded(); clearTake(); render(); };
    tabs.appendChild(b);
  }
  $('coach').style.display = activeTab === 'graphemes' ? 'block' : 'none';

  const list = $('list');
  list.innerHTML = '';
  for (const c of tabClips(activeTab)) {
    const row = document.createElement('div');
    row.className = 'row' + (c === selected ? ' selected' : '');
    row.innerHTML =
      `<span class="check">${c.exists ? '✅' : ''}</span>` +
      `<span class="file">${c.id}.${c.ext || (hasMp3 ? 'mp3' : 'wav')}</span>` +
      `<span class="say">${escapeHtml(c.scriptLine)}</span>`;
    row.onclick = () => { selected = c; clearTake(); render(); };
    list.appendChild(row);
    if (c === selected) row.scrollIntoView({ block: 'nearest' });
  }

  renderCard();
}

function renderCard() {
  if (!selected) { $('say').textContent = 'All done! 🎉'; return; }
  $('file').textContent = `public/audio/${selected.kind}/${selected.id}.${take ? take.format : selected.ext || (hasMp3 ? 'mp3' : 'wav')}`;
  $('say').textContent = selected.scriptLine;
  $('note').textContent = selected.note || '';

  const ex = $('existing');
  ex.style.display = selected.exists ? 'flex' : 'none';
  if (selected.exists) $('existing-label').textContent = `Already recorded (.${selected.ext})`;

  $('btn-record').textContent = recording ? '⏹ Stop' : '⏺ Record';
  $('btn-record').classList.toggle('recording', recording);
  $('btn-preview').disabled = !take;
  $('btn-save').disabled = !take;
  $('btn-retake').disabled = !take && !recording;
}

function setStatus(msg) { $('status').textContent = msg; }

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
}

function clearTake() {
  take = null;
  if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
  setStatus('');
  renderCard();
}

// ---------- recording ----------

async function ensureMic() {
  if (stream) return true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: true, autoGainControl: true },
    });
    const ac = new AudioContext();
    analyser = ac.createAnalyser();
    analyser.fftSize = 1024;
    ac.createMediaStreamSource(stream).connect(analyser);
    return true;
  } catch (err) {
    setStatus(`Mic unavailable: ${err.message}. Use localhost (not an IP) and allow the microphone.`);
    return false;
  }
}

function meterLoop() {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  let peak = 0;
  for (const v of buf) peak = Math.max(peak, Math.abs(v - 128));
  $('meter').style.width = `${Math.min(100, (peak / 128) * 160)}%`;
  meterRaf = requestAnimationFrame(meterLoop);
}

async function toggleRecord() {
  if (recording) {
    if (recorder && recorder.state === 'recording') recorder.stop();
    return;
  }
  if (!selected || !(await ensureMic())) return;
  clearTake();
  recChunks = [];
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = (e) => { if (e.data.size > 0) recChunks.push(e.data); };
  recorder.onstop = () => {
    recording = false;
    cancelAnimationFrame(meterRaf);
    $('meter').style.width = '0%';
    renderCard();
    processTake(new Blob(recChunks, { type: recorder.mimeType }));
  };
  recorder.start();
  recording = true;
  meterLoop();
  setStatus('Recording… press Space or ⏹ to stop.');
  renderCard();
}

// ---------- encoding ----------

async function processTake(blob) {
  setStatus('Encoding…');
  try {
    // decode whatever the browser recorded, then render through an offline
    // context to get mono 44100 Hz in one step (downmix + resample together);
    // one shared context — browsers cap how many you can create
    decodeCtx = decodeCtx || new AudioContext();
    const decoded = await decodeCtx.decodeAudioData(await blob.arrayBuffer());
    const offline = new OfflineAudioContext(1, Math.max(1, Math.ceil(decoded.duration * SAMPLE_RATE)), SAMPLE_RATE);
    const src = offline.createBufferSource();
    src.buffer = decoded;
    src.connect(offline.destination);
    src.start();
    const mono = (await offline.startRendering()).getChannelData(0);

    const trimmed = trimSilence(mono);
    if (trimmed.length < SAMPLE_RATE * 0.05) {
      setStatus('That take was silent — try again a little louder.');
      return;
    }
    const pcm = floatToInt16(trimmed);
    if (hasMp3) {
      take = { bytes: encodeMp3(pcm), format: 'mp3', mime: 'audio/mpeg' };
    } else {
      take = { bytes: encodeWav(pcm), format: 'wav', mime: 'audio/wav' };
    }
    previewUrl = URL.createObjectURL(new Blob([take.bytes], { type: take.mime }));
    setStatus(`Take ready (${(trimmed.length / SAMPLE_RATE).toFixed(1)}s, ${take.format}). Preview, then Enter to save.`);
  } catch (err) {
    setStatus(`Could not process that take: ${err.message}`);
  }
  renderCard();
}

/** Cut leading/trailing near-silence so taps and breaths don't pad clips. */
function trimSilence(samples) {
  const threshold = 0.012;
  const pad = Math.floor(SAMPLE_RATE * 0.06);
  let start = 0;
  let end = samples.length - 1;
  while (start < samples.length && Math.abs(samples[start]) < threshold) start++;
  while (end > start && Math.abs(samples[end]) < threshold) end--;
  if (start >= end) return samples; // all silence — let the length check catch it
  return samples.slice(Math.max(0, start - pad), Math.min(samples.length, end + 1 + pad));
}

function floatToInt16(f32) {
  const out = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return out;
}

function encodeMp3(pcm) {
  const enc = new window.lamejs.Mp3Encoder(1, SAMPLE_RATE, 96);
  const parts = [];
  for (let i = 0; i < pcm.length; i += 1152) {
    const chunk = enc.encodeBuffer(pcm.subarray(i, i + 1152));
    if (chunk.length > 0) parts.push(chunk);
  }
  const tail = enc.flush();
  if (tail.length > 0) parts.push(tail);
  const total = parts.reduce((n, p) => n + p.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}

/** Minimal 16-bit PCM mono WAV — fallback when lamejs isn't served. */
function encodeWav(pcm) {
  const buf = new ArrayBuffer(44 + pcm.length * 2);
  const v = new DataView(buf);
  const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
  str(0, 'RIFF');
  v.setUint32(4, 36 + pcm.length * 2, true);
  str(8, 'WAVE');
  str(12, 'fmt ');
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);       // PCM
  v.setUint16(22, 1, true);       // mono
  v.setUint32(24, SAMPLE_RATE, true);
  v.setUint32(28, SAMPLE_RATE * 2, true);
  v.setUint16(32, 2, true);
  v.setUint16(34, 16, true);
  str(36, 'data');
  v.setUint32(40, pcm.length * 2, true);
  new Int16Array(buf, 44).set(pcm);
  return new Uint8Array(buf);
}

function bytesToBase64(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i += 0x8000) {
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  }
  return btoa(s);
}

// ---------- saving ----------

async function save() {
  if (!take || !selected) return;
  setStatus('Saving…');
  const res = await fetch('/save', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ kind: selected.kind, id: selected.id, format: take.format, data: bytesToBase64(take.bytes) }),
  });
  const body = await res.json();
  if (!body.ok) { setStatus(`Save failed: ${body.error}`); return; }
  selected.exists = true;
  selected.ext = take.format;
  advance();
}

async function deleteExisting() {
  if (!selected || !selected.exists) return;
  const res = await fetch(`/clip?kind=${encodeURIComponent(selected.kind)}&id=${encodeURIComponent(selected.id)}`, { method: 'DELETE' });
  const body = await res.json();
  if (!body.ok) { setStatus(`Delete failed: ${body.error}`); return; }
  selected.exists = false;
  selected.ext = null;
  clearTake();
  render();
  setStatus('Old take deleted — record a fresh one.');
}

// ---------- wiring ----------

$('btn-record').onclick = toggleRecord;
$('btn-save').onclick = save;
$('btn-skip').onclick = advance;
$('btn-retake').onclick = () => { if (recording) recorder.stop(); else { clearTake(); toggleRecord(); } };
$('btn-preview').onclick = () => { if (previewUrl) new Audio(previewUrl).play(); };
$('btn-play-existing').onclick = () => {
  if (selected && selected.exists) new Audio(`/audio/${selected.kind}/${selected.id}.${selected.ext}`).play();
};
$('btn-delete').onclick = deleteExisting;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); toggleRecord(); }
  if (e.code === 'Enter' && take) { e.preventDefault(); save(); }
});

if (!hasMp3) setStatus('MP3 encoder not loaded — recordings will save as WAV (the game plays those too).');
loadManifest();
</script>
</body>
</html>
